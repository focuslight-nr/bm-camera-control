name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Windows has WebView2 preinstalled and needs no extra system libs for Tauri,
    # and building the frontend first lets `cargo check` resolve generate_context!.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Type-check + build frontend
        run: npm run build # tsc && vite build (also produces ../dist for Tauri)

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml
